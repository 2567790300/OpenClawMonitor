name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print Working Directory
        run: |
          pwd
          ls -la

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen --version

      - name: Generate Xcode Project
        run: |
          xcodegen generate

      - name: List Project Files
        run: |
          ls -la *.xcodeproj 2>/dev/null || echo "No xcodeproj found"

      - name: Build iOS Project
        run: |
          xcodebuild -project OpenClawMonitor.xcodeproj \
            -scheme OpenClawMonitor \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create IPA
        run: |
          mkdir -p output
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "OpenClawMonitor.app" -type d 2>/dev/null | head -1)
          cp -r "$APP_PATH" ./output/
          cd output
          zip -r OpenClawMonitor.ipa OpenClawMonitor.app

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenClawMonitor-IPA
          path: ./output/OpenClawMonitor.ipa
