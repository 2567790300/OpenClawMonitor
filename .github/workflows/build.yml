name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen --version

      - name: Generate Xcode Project
        run: |
          xcodegen generate

      - name: Build iOS Project
        run: |
          xcodebuild -project OpenClawMonitor.xcodeproj \
            -scheme OpenClawMonitor \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Find Built App
        id: find-app
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "OpenClawMonitor.app" -type d 2>/dev/null | head -1)
          echo "App path: $APP_PATH"
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT

      - name: Create IPA
        run: |
          mkdir -p output
          cp -r "${{ steps.find-app.outputs.app_path }}" ./output/OpenClawMonitor.app
          cd output
          zip -r OpenClawMonitor.app.zip OpenClawMonitor.app
          mv OpenClawMonitor.app.zip ../OpenClawMonitor.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenClawMonitor-IPA
          path: ./OpenClawMonitor.ipa

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: OpenClawMonitor-App-Bundle
          path: ./output/OpenClawMonitor.app
