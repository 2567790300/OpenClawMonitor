name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          brew install xcodegen

      - name: Generate Xcode Project
        run: |
          xcodegen generate

      - name: Build iOS Project
        run: |
          xcodebuild -project OpenClawMonitor.xcodeproj \
            -scheme OpenClawMonitor \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create IPA with xcodebuild
        run: |
          # Find the built app
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "OpenClawMonitor.app" -type d 2>/dev/null | head -1)
          echo "Found app at: $APP_PATH"

          # Create a proper IPA
          mkdir -p output
          cp -r "$APP_PATH" output/

          # Create the IPA using zip (proper structure for TrollStore)
          cd output
          zip -r ../OpenClawMonitor.ipa OpenClawMonitor.app
          cd ..

          ls -la OpenClawMonitor.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenClawMonitor-IPA
          path: ./OpenClawMonitor.ipa
