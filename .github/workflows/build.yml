name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          which xcodegen || brew install xcodegen
          xcodegen --version

      - name: List Files
        run: |
          pwd
          ls -la
          ls -la OpenClawMonitor/ || echo "OpenClawMonitor directory not found"

      - name: Generate Xcode Project
        run: |
          cd OpenClawMonitor
          pwd
          ls -la
          xcodegen generate 2>&1 || echo "XcodeGen failed"

      - name: Verify Project Generated
        run: |
          ls -la OpenClawMonitor/*.xcodeproj 2>/dev/null || echo "No xcodeproj found"

      - name: Build iOS Project
        run: |
          cd OpenClawMonitor
          xcodebuild -project OpenClawMonitor.xcodeproj \
            -scheme OpenClawMonitor \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tail -50

      - name: Create ZIP
        if: success()
        run: |
          cd OpenClawMonitor
          mkdir -p output
          find ~/Library/Developer/Xcode/DerivedData -name "OpenClawMonitor.app" -type d 2>/dev/null | head -1 | xargs -I {} cp -r {} ./output/ 2>/dev/null || echo "App not found"
          cd output
          zip -r OpenClawMonitor.ipa OpenClawMonitor.app 2>/dev/null || echo "Zip failed"

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: OpenClawMonitor-IPA
          path: OpenClawMonitor/output/OpenClawMonitor.ipa
          retention-days: 5

      - name: Upload App Bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: OpenClawMonitor-App
          path: OpenClawMonitor/output/OpenClawMonitor.app
          retention-days: 5
