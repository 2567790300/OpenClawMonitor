name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          brew install xcodegen

      - name: Generate Xcode Project
        run: |
          xcodegen generate

      - name: Build iOS Project
        run: |
          xcodebuild -project OpenClawMonitor.xcodeproj \
            -scheme OpenClawMonitor \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create IPA with xcodebuild
        run: |
          # Find the app
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "OpenClawMonitor.app" -type d 2>/dev/null | head -1)
          echo "App path: $APP_PATH"

          # Create a proper IPA structure for Sideloadly/TrollStore
          # The app must be in Payload folder
          rm -rf Payload OpenClawMonitor.ipa
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/

          # Verify contents
          ls -la Payload/

          # Create the zip
          cd Payload
          zip -r ../OpenClawMonitor.ipa *
          cd ..

          # Verify IPA contents
          unzip -l OpenClawMonitor.ipa

          ls -la OpenClawMonitor.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenClawMonitor-IPA
          path: ./OpenClawMonitor.ipa
