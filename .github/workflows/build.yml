name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd OpenClawMonitor
          xcodegen generate

      - name: Build iOS Project
        run: |
          cd OpenClawMonitor
          xcodebuild -project OpenClawMonitor.xcodeproj \
            -scheme OpenClawMonitor \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -quiet \
            build

      - name: Create ZIP
        run: |
          cd OpenClawMonitor
          mkdir -p output
          cp -r ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/OpenClawMonitor.app ./output/
          cd output
          zip -r OpenClawMonitor.ipa OpenClawMonitor.app

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenClawMonitor-IPA
          path: OpenClawMonitor/output/OpenClawMonitor.ipa

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: OpenClawMonitor-App
          path: OpenClawMonitor/output/OpenClawMonitor.app
