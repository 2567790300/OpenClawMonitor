name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          brew install xcodegen

      - name: Generate Xcode Project
        run: |
          xcodegen generate

      - name: Build iOS Project
        run: |
          xcodebuild -project OpenClawMonitor.xcodeproj \
            -scheme OpenClawMonitor \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create Proper IPA for TrollStore
        run: |
          # Find the built app
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "OpenClawMonitor.app" -type d 2>/dev/null | head -1)
          echo "Found app at: $APP_PATH"

          # Create Payload folder structure for TrollStore
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/

          # Create IPA with proper structure
          zip -r OpenClawMonitor.ipa Payload

          # Verify contents
          unzip -l OpenClawMonitor.ipa | head -20

          ls -la OpenClawMonitor.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenClawMonitor-IPA
          path: ./OpenClawMonitor.ipa
